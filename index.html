<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Moodboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="aura-bg" class="aura-bg"></div>
    <div class="noise-overlay"></div>

    <div class="app-container">
        <header class="glass-header">
            <h1>Moodboard</h1>
            <nav class="nav-links">
                <button onclick="scrollToSection('recent')">Recent</button>
                <button onclick="scrollToSection('all-time')">All-Time</button>
                <button onclick="scrollToSection('playlists')">Playlists</button>
                <button onclick="scrollToSection('mood')" class="mood-btn">Mood</button>
            </nav>
        </header>

        <main class="carousel-container" id="carousel" onscroll="handleScroll()">
            <!-- Recent Tracks Section -->
            <section class="carousel-section" id="recent">
                <div class="section-content">
                    <h2 class="section-title">Recent Tracks</h2>
                    <div class="grid-container">
                        
                        <a href="#" target="_blank" class="card glass-card">
                            <div class="card-image">
                                <img src="https://via.placeholder.com/150/1db954/ffffff?text=Track+1" alt="Dummy Track 1">
                            </div>
                            <div class="card-info">
                                <h3>Dummy Track 1</h3>
                                <p>Artist A</p>
                            </div>
                        </a>
                        
                    </div>
                </div>
            </section>

            <!-- All-Time Top Tracks Section -->
            <section class="carousel-section" id="all-time">
                <div class="section-content">
                    <h2 class="section-title">All-Time Top Tracks</h2>
                    <div class="grid-container">
                        
                        <a href="#" target="_blank" class="card glass-card">
                            <div class="card-image">
                                <img src="https://via.placeholder.com/150/ff4d4d/ffffff?text=Top+1" alt="Top Dummy 1">
                            </div>
                            <div class="card-info">
                                <h3>Top Dummy 1</h3>
                                <p>Artist B</p>
                            </div>
                        </a>
                        
                    </div>
                </div>
            </section>

            <!-- Playlists Section -->
            <section class="carousel-section" id="playlists">
                <div class="section-content">
                    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                        <h2 class="section-title" style="margin-bottom: 0;">Your Playlists</h2>
                        <label class="toggle-switch-container">
                            <input type="checkbox" id="toggle-third-party" checked onchange="toggleThirdPartyPlaylists()">
                            <div class="toggle-switch"></div>
                            <span>Show Third-Party Playlists</span>
                        </label>
                    </div>
                    <div class="grid-container">
                        
                        <a href="#" target="_blank" class="card glass-card playlist-card ">
                            <div class="card-image">
                                <img src="https://via.placeholder.com/150/4d79ff/ffffff?text=Playlist+1" alt="Late Night Sadness">
                            </div>
                            <div class="card-info">
                                <h3>Late Night Sadness</h3>
                                <p>User C</p> 
                            </div>
                        </a>
                        
                        <a href="#" target="_blank" class="card glass-card playlist-card ">
                            <div class="card-image">
                                <img src="https://via.placeholder.com/150/4d79ff/ffffff?text=Playlist+2" alt="Morning Coffee Chill">
                            </div>
                            <div class="card-info">
                                <h3>Morning Coffee Chill</h3>
                                <p>User C</p> 
                            </div>
                        </a>
                        
                    </div>
                </div>
            </section>

            <!-- Mood Section -->
            <section class="carousel-section" id="mood">
                <div class="section-content mood-content">
                    <div class="mood-selector">
                        <h2 class="section-title">Recent Tracks</h2>
                    </div>

                    <div class="mood-display">
                        <h2 id="mood-percentage" class="mood-percentage">0%</h2>
                        <h3 id="mood-name" class="mood-name">UNKNOWN</h3>
                        <div id="mood-bars" class="mood-bars">
                            <!-- Bars generated via JS -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const moodData = {"recent": {"dominant": "Happy", "colors": ["#FFB703", "#FB8500"], "percentages": {"Happy": 60, "Chill": 20, "Sad": 10, "Angry": 10}, "max_percentage": 60}};

        function scrollToSection(id) {
            const container = document.getElementById('carousel');
            const section = document.getElementById(id);
            if(container && section) {
                container.scrollTo({
                    left: section.offsetLeft,
                    behavior: 'smooth'
                });
            }
        }

        function toggleThirdPartyPlaylists() {
            const checkbox = document.getElementById('toggle-third-party');
            const thirdPartyCards = document.querySelectorAll('.third-party-playlist');
            thirdPartyCards.forEach(card => {
                if (checkbox.checked) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function handleScroll() {
            const container = document.getElementById('carousel');
            const moodSection = document.getElementById('mood');
            const auraBg = document.getElementById('aura-bg');
            
            // Check if we are viewing the mood section
            const scrollPos = container.scrollLeft + (container.clientWidth / 2);
            if (scrollPos >= moodSection.offsetLeft) {
                auraBg.classList.add('active');
            } else {
                auraBg.classList.remove('active');
            }
        }

        function updateMood() {
            const data = moodData['recent'];
            
            if (!data) return;

            const auraBg = document.getElementById('aura-bg');
            auraBg.style.setProperty('--aura-c1', data.colors[0]);
            auraBg.style.setProperty('--aura-c2', data.colors[1]);
            
            // Speed depends on emotion (Happy/Angry = fast, Sad/Chill = slow)
            if (data.dominant === 'Happy' || data.dominant === 'Angry') {
                auraBg.style.setProperty('--aura-speed', '4s');
            } else {
                auraBg.style.setProperty('--aura-speed', '12s');
            }

            const maxPct = data.max_percentage != null ? data.max_percentage : 0;
            document.getElementById('mood-percentage').innerText = `${maxPct}%`;
            document.getElementById('mood-name').innerText = (data.dominant || 'UNKNOWN').toUpperCase();

            // Render bars
            const barsContainer = document.getElementById('mood-bars');
            barsContainer.innerHTML = '';
            
            const emotions = ['Happy', 'Chill', 'Sad', 'Angry'];
            emotions.forEach(emo => {
                const pct = data.percentages[emo] || 0;
                const barWrapper = document.createElement('div');
                barWrapper.className = 'mood-bar-wrapper';
                
                const label = document.createElement('span');
                label.innerText = emo.toUpperCase();
                
                const track = document.createElement('div');
                track.className = 'mood-bar-track';
                
                const fill = document.createElement('div');
                fill.className = 'mood-bar-fill';
                fill.style.width = `${pct}%`;
                
                track.appendChild(fill);
                barWrapper.appendChild(label);
                barWrapper.appendChild(track);
                barsContainer.appendChild(barWrapper);
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateMood();
        });
    </script>
</body>
</html>
